name: Android CD

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v2.3.1)'
        required: true
        default: 'v2.3.1'

jobs:
  Release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Archive App
        uses: actions/upload-artifact@v7
        with:
          path: |
            app/build/outputs/apk/release/*.apk

      - name: Prepare Changelog Path
        id: changelog_meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          CLEAN_TAG=$(echo "$TAG" | sed 's/^v//i' | tr -d '.')
          FILE_PATH="fastlane/metadata/android/en-US/changelogs/${CLEAN_TAG}.txt"
          echo "path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog_meta.outputs.tag }}
          name: ${{ steps.changelog_meta.outputs.tag }}
          files: app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: ${{ steps.changelog_meta.outputs.path }}
